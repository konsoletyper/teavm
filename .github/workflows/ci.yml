name: Build
on:
  pull_request:
  push:
    branches:
      - master
      - 'release-**'
      - 'check-**'
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform:
        - c
        - js
        - wasm-gc
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v3
      with:
        java-version: 25
        distribution: adopt
    - uses: actions/setup-node@v4
    - uses: gradle/gradle-build-action@v2
    - run: |
        platforms=("c" "js" "wasm-gc")
        args=()
        for v in "${platforms[@]}"
        do
          if [[ "${{ matrix.platform }}" != "$v" ]]; then
            args+=("-Pteavm.tests.${v}=false")
          fi
        done
        args+=("-Pteavm.localNodeJS=true")
        args+=("-Dorg.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m")
        echo "${args[@]}"
        export TEAVM_TEST_BROWSER_LOG=1
        ./gradlew "${args[@]}" --stacktrace test
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: "test-reports-${{ matrix.platform }}"
        path: |
          tests/build/reports/tests/test
          tests/build/teavm-tests/browser-stderr-*.txt
          tests/build/teavm-tests/browser-stdout-*.txt
  checkstyle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          java-version: 25
          distribution: adopt
      - uses: gradle/gradle-build-action@v2
      - run: |
          args=()
          args+=("-Dorg.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m")
          ./gradlew "${args[@]}" check -x test